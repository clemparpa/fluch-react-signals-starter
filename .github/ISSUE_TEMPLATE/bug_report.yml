name: Bug report
description: Report a bug in the template
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this bug has not already been reported.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I run `pnpm build`, …
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, reproducible steps. Ideally from a clean clone.
      placeholder: |
        1. `git clone …`
        2. `pnpm install`
        3. `pnpm <command>`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version` (template requires ≥ 22).
      placeholder: v22.x.x
    validations:
      required: true

  - type: input
    id: pnpm-version
    attributes:
      label: pnpm version
      description: Output of `pnpm --version` (template requires ≥ 9).
      placeholder: 9.x.x
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, related issues, anything else useful.
    validations:
      required: false
