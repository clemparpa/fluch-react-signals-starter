# Dependabot config for fluch-react-signals-starter.
#
# MONOREPO USERS: change `directories: ["/"]` below to your package path,
# e.g. `directories: ["/apps/front"]`. If another template in your monorepo
# already declares a `github-actions` entry at the root, keep only one —
# Dependabot scans `.github/workflows/` repo-wide.

version: 2
updates:
  - package-ecosystem: "npm"
    directories: ["/"]
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Skip patch bumps (8.0.12 → 8.0.13). They get pulled in passively
    # with the next minor anyway — too noisy as standalone PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
